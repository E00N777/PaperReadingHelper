# 论文贡献摘要生成 - 配置文件

project:
  name: paper_contribution_summary
  seed: 42

data:
  cs_papersum_dir: "data/cs_papersum"      # 从 Google Drive 下载后解压路径
  arxiv_test_dir: "data/arxiv_test"       # 自建 arXiv 测试集
  max_input_length: 512                   # 降低显存/内存占用，避免卡死
  max_output_length: 128                  # 摘要最大长度
  max_samples: 3000                      # 默认只加载 3000 条，避免吃满内存
  train_ratio: 0.9
  val_ratio: 0.05
  test_ratio: 0.05

# 输入模式（用于消融）
input_modes:
  abstract_intro_only: true   # 仅摘要+引言
  full_text: true             # 全文（或 title+abstract+conclusion）

model:
  name: "facebook/bart-large-cnn"         # 或 led-base-16384 长文档
  long_doc_model: "allenai/led-base-16384"
  use_long_doc: false                     # 是否使用 LED 处理长文档
  batch_size: 1                           # 小 batch 降低显存，避免卡死
  learning_rate: 5.0e-5
  num_epochs: 2
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1          # 不累积，减轻峰值占用

evaluation:
  metrics: ["rouge1", "rouge2", "rougeL", "bertscore"]
  bertscore_model: "microsoft/deberta-xlarge-mnli"

ablation:
  long_doc_strategies: ["truncate", "chunk_max", "hierarchical"]
  input_sections: ["abstract_intro", "full"]
